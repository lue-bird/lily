<!doctype html>
<html>
    <head>
        <title>lily</title>
        <meta lang="en-us" viewport="width=device-width, initial-scale=1.0" />
        <link data-trunk rel="copy-dir" href="./assets/" />
        <link rel="icon" type="image/svg" href="assets/favicon.svg" />
        <style>
            input,
            button,
            select,
            button {
                font-size: inherit;
            }
            button {
                text-decoration: dotted underline;
                border: none;
                cursor: pointer;
                background-color: transparent;
                color: inherit;
            }
            body {
                padding-left: 4%;
                padding-right: 1em;
                padding-top: 1em;
                font-family: sans-serif;
                max-width: 54rem;
                background-color: rgb(17, 5, 0);
                color: rgb(255, 220, 200);
                font-size: 1.1em;
            }
            textarea:focus {
                border: none;
                outline: none;
            }
            textarea::selection {
                color: transparent;
            }
            *::selection {
                /* hacky way to avoid automatic transparency added by webkit
               https://github.com/w3c/csswg-drafts/issues/6853
               */
                background-color: rgba(80, 0, 50, 0.99);
            }
            code {
                /* An abhorrent, hacky, fragile, somewhat-good-enough working
                fix to monospace fonts having a different default font size in different browsers.
                Big fat thanks to https://meyerweb.com/eric/thoughts/2010/02/12/fixed-monospace-sizing/
                If you know a better way to fix, open an issue, thanks!
                */
                font-family: "Liga NovaMono", monospace, sans-serif;
                font-size: medium;
                line-height: inherit;
            }
            a {
                color: rgb(230, 150, 0);
                font-weight: bold;
                text-decoration: underline;
            }
        </style>
    </head>
    <body></body>
</html>
